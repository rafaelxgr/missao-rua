name: Restaurar personalizacoes finais

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restore-final-customizations.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restaurar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restaurar componente final e manter numero correto
        run: |
          git show 8ad0d137127df9d4d9186ae87f80de7e0e55a791:assets/js/components.js > assets/js/components.js
          python - <<'PY'
          from pathlib import Path

          components = Path('assets/js/components.js')
          text = components.read_text(encoding='utf-8')
          text = text.replace('551998675130', '5511998675130')
          components.write_text(text, encoding='utf-8')

          contato = Path('contato.html')
          if contato.exists():
              text = contato.read_text(encoding='utf-8')
              text = text.replace('+5511998675130', '+55 11 99867-5130')
              contato.write_text(text, encoding='utf-8')
          PY

      - name: Remover workflow temporario
        run: rm .github/workflows/restore-final-customizations.yml

      - name: Commit da restauracao
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Restaurar emails, contatos e botao de retorno"
          git push