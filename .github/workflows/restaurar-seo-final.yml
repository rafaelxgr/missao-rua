name: Restaurar versao final e SEO

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/restaurar-seo-final.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restaurar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restaurar arquivos finais sem reativar workflow antigo
        run: |
          git ls-tree -r --name-only 4efec5604d28174e943e1cfb4eed544552b7138a \
            | grep -v '^.github/' \
            | while IFS= read -r arquivo; do
                git checkout 4efec5604d28174e943e1cfb4eed544552b7138a -- "$arquivo"
              done

      - name: Aplicar indexacao e SEO tecnico
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import html

          base = 'https://missaorua.com.br'
          image = f'{base}/assets/img/Home_Ruas.jpeg'
          pages = {
              'index.html': (
                  'Missão Rua | Ações solidárias e apoio a pessoas em situação de rua',
                  'A Missão Rua realiza ações solidárias com alimentos, roupas, apoio e presença para pessoas em situação de vulnerabilidade. Conheça e ajude.',
                  f'{base}/',
              ),
              'como-ajudar.html': (
                  'Como ajudar a Missão Rua | Doações e voluntariado',
                  'Veja como apoiar a Missão Rua com alimentos, roupas, cobertores, Pix, parcerias, voluntariado e divulgação das ações solidárias.',
                  f'{base}/como-ajudar.html',
              ),
              'transparencia.html': (
                  'Transparência e ações realizadas | Missão Rua',
                  'Conheça registros das ações da Missão Rua, entregas realizadas e o trabalho desenvolvido com pessoas em situação de vulnerabilidade.',
                  f'{base}/transparencia.html',
              ),
              'contato.html': (
                  'Contato, doações e parcerias | Missão Rua',
                  'Entre em contato com a Missão Rua para doações, parcerias, voluntariado, apoio às ações e informações sobre o projeto social.',
                  f'{base}/contato.html',
              ),
              'sobre.html': (
                  'Sobre a Missão Rua | Projeto social e ações solidárias',
                  'Conheça a história, o propósito e as ações da Missão Rua, projeto social criado para levar alimento, apoio e dignidade a quem precisa.',
                  f'{base}/sobre.html',
              ),
          }

          for filename, (title, description, canonical) in pages.items():
              path = Path(filename)
              text = path.read_text(encoding='utf-8')

              text = re.sub(r'<title>.*?</title>', f'<title>{html.escape(title)}</title>', text, count=1, flags=re.I | re.S)

              desc_tag = f'<meta name="description" content="{html.escape(description, quote=True)}">'
              if re.search(r'<meta\s+name=["\']description["\'][^>]*>', text, flags=re.I):
                  text = re.sub(r'<meta\s+name=["\']description["\'][^>]*>', desc_tag, text, count=1, flags=re.I)
              else:
                  text = text.replace(f'<title>{html.escape(title)}</title>', f'<title>{html.escape(title)}</title>\n  {desc_tag}', 1)

              robots_tag = '<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">'
              if re.search(r'<meta\s+name=["\']robots["\'][^>]*>', text, flags=re.I):
                  text = re.sub(r'<meta\s+name=["\']robots["\'][^>]*>', robots_tag, text, count=1, flags=re.I)
              else:
                  text = text.replace(desc_tag, desc_tag + '\n  ' + robots_tag, 1)

              text = re.sub(r'\n?\s*<!-- SEO TECNICO START -->.*?<!-- SEO TECNICO END -->\s*', '\n', text, flags=re.I | re.S)
              text = re.sub(r'\n?\s*<script type="application/ld\+json">.*?</script>\s*', '\n', text, flags=re.I | re.S)

              seo = f'''  <!-- SEO TECNICO START -->
  <link rel="canonical" href="{canonical}">
  <meta property="og:locale" content="pt_BR">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Missão Rua">
  <meta property="og:title" content="{html.escape(title, quote=True)}">
  <meta property="og:description" content="{html.escape(description, quote=True)}">
  <meta property="og:url" content="{canonical}">
  <meta property="og:image" content="{image}">
  <meta property="og:image:alt" content="Ação solidária da Missão Rua">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{html.escape(title, quote=True)}">
  <meta name="twitter:description" content="{html.escape(description, quote=True)}">
  <meta name="twitter:image" content="{image}">
  <!-- SEO TECNICO END -->
'''
              if filename == 'index.html':
                  seo += '''  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Missão Rua",
    "url": "https://missaorua.com.br/",
    "logo": "https://missaorua.com.br/assets/img/Favicon_Missao.png",
    "description": "Projeto social que realiza ações solidárias e leva alimento, apoio e presença a pessoas em situação de vulnerabilidade.",
    "sameAs": ["https://www.instagram.com/missao.rua/"],
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+55-11-99867-5130",
      "contactType": "atendimento",
      "availableLanguage": "Portuguese"
    }
  }
  </script>
'''
              text = text.replace('</head>', seo + '</head>', 1)
              path.write_text(text, encoding='utf-8')

          Path('robots.txt').write_text(
              'User-agent: *\nAllow: /\n\nSitemap: https://missaorua.com.br/sitemap.xml\n',
              encoding='utf-8'
          )

          urls = [
              'https://missaorua.com.br/',
              'https://missaorua.com.br/como-ajudar.html',
              'https://missaorua.com.br/transparencia.html',
              'https://missaorua.com.br/contato.html',
              'https://missaorua.com.br/sobre.html',
          ]
          body = '\n'.join(f'  <url><loc>{url}</loc><lastmod>2026-07-21</lastmod></url>' for url in urls)
          Path('sitemap.xml').write_text(
              '<?xml version="1.0" encoding="UTF-8"?>\n'
              '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
              f'{body}\n'
              '</urlset>\n',
              encoding='utf-8'
          )
          PY

      - name: Remover workflow temporario
        run: rm .github/workflows/restaurar-seo-final.yml

      - name: Commit final
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Restaurar site final e liberar indexacao no Google"
          git push