name: SEO Como Ajudar

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/seo-como-ajudar.yml'

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Atualizar metadados
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('como-ajudar.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('<title>Como ajudar | Missão Rua</title>', '<title>Como ajudar a Missão Rua | Doações e voluntariado</title>')
          s = s.replace('<meta name="description" content="Veja formas de apoiar a Missão Rua.">', '<meta name="description" content="Veja como apoiar a Missão Rua com alimentos, roupas, cobertores, Pix, parcerias, voluntariado e divulgação das ações solidárias.">')
          s = s.replace('<meta name="robots" content="noindex,nofollow">', '<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">')
          canonical = '<link rel="canonical" href="https://missaorua.com.br/como-ajudar.html">'
          if canonical not in s:
              s = s.replace('<meta name="theme-color" content="#c66a1f">', canonical + '\n  <meta property="og:title" content="Como ajudar a Missão Rua | Doações e voluntariado">\n  <meta property="og:description" content="Ajude com doações, Pix, preparo, entrega, parcerias, divulgação ou voluntariado.">\n  <meta property="og:url" content="https://missaorua.com.br/como-ajudar.html">\n  <meta property="og:image" content="https://missaorua.com.br/assets/img/Card_missao.png">\n  <meta name="theme-color" content="#c66a1f">')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Remover workflow temporario
        run: rm .github/workflows/seo-como-ajudar.yml
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Otimizar SEO da pagina Como ajudar" || true
          git push