name: Corrigir numero do WhatsApp

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-whatsapp-number.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  corrigir-numero:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Corrigir todas as ocorrencias
        run: |
          python - <<'PY'
          from pathlib import Path

          antigo = '551998675130'
          novo = '5511998675130'
          alterados = []

          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              try:
                  texto = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError):
                  continue
              atualizado = texto.replace(antigo, novo)
              if atualizado != texto:
                  path.write_text(atualizado, encoding='utf-8')
                  alterados.append(str(path))

          print('Arquivos corrigidos:', alterados)
          PY

      - name: Remover workflow temporario
        run: rm .github/workflows/fix-whatsapp-number.yml

      - name: Commit da correcao
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Corrigir numero oficial do WhatsApp"
          git push